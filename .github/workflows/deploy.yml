name: Build and Deploy to Azure

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v2
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and Push Docker Image
        run: |
          docker build --build-arg GITHUB_TOKEN=${{ secrets.PERSONAL_ACCESS_TOKEN }} -t ${{ secrets.ACR_LOGIN_SERVER }}/skillsync:latest .
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/skillsync:latest

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          images: ${{ secrets.ACR_LOGIN_SERVER }}/skillsync:latest

      - name: Post-Deployment Config
        run: |
          az webapp config appsettings set --name ${{ secrets.AZURE_WEBAPP_NAME }} --resource-group ${{ secrets.AZURE_RESOURCE_GROUP || 'CodeRAG-Group' }} --settings \
            WEBSITES_PORT=8080 \
            GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}" \
            ACS_CONNECTION_STRING="${{ secrets.ACS_CONNECTION_STRING }}" \
            ACS_SENDER_EMAIL="${{ secrets.ACS_SENDER_EMAIL }}" \
            TWILIO_ACCOUNT_SID="${{ secrets.TWILIO_ACCOUNT_SID }}" \
            TWILIO_AUTH_TOKEN="${{ secrets.TWILIO_AUTH_TOKEN }}" \
            TWILIO_PHONE_NUMBER="${{ secrets.TWILIO_PHONE_NUMBER }}"
          echo "Deployment successful to ${{ secrets.AZURE_WEBAPP_NAME }}"
