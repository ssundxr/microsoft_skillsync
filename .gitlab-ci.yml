stages:
  - build
  - deploy

variables:
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: ""

# Build Docker image & push to Azure Container Registry (ACR)
build_and_push:
  stage: build
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  only:
    - main
  before_script:
    - echo "$ACR_PASSWORD" | docker login $ACR_LOGIN_SERVER -u $ACR_USERNAME --password-stdin
  script:
    - docker build -t $ACR_LOGIN_SERVER/skillsync:$CI_COMMIT_SHA -t $ACR_LOGIN_SERVER/skillsync:latest .
    - docker push $ACR_LOGIN_SERVER/skillsync:$CI_COMMIT_SHA
    - docker push $ACR_LOGIN_SERVER/skillsync:latest

# Deploy updated image to Azure Web App for Containers
deploy_to_azure:
  stage: deploy
  image: mcr.microsoft.com/azure-cli
  only:
    - main
  script:
    - az login --service-principal -u $AZURE_CLIENT_ID -p $AZURE_CLIENT_SECRET --tenant $AZURE_TENANT_ID
    - az webapp config container set --name $AZURE_WEBAPP_NAME --resource-group $AZURE_RESOURCE_GROUP --docker-custom-image-name $ACR_LOGIN_SERVER/skillsync:$CI_COMMIT_SHA --docker-registry-server-url https://$ACR_LOGIN_SERVER --docker-registry-server-user $ACR_USERNAME --docker-registry-server-password "$ACR_PASSWORD"
    - az webapp config appsettings set --name $AZURE_WEBAPP_NAME --resource-group $AZURE_RESOURCE_GROUP --settings "DOCKER_REGISTRY_SERVER_PASSWORD=$ACR_PASSWORD" "WEBSITES_PORT=80" "PORT=80"
    - az webapp restart --name $AZURE_WEBAPP_NAME --resource-group $AZURE_RESOURCE_GROUP
