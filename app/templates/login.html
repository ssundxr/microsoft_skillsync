{% extends "base.html" %}

{% block content %}
<div class="min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8 bg-slate-50">
    <div class="max-w-md w-full space-y-8 bg-white p-8 sm:p-10 rounded-2xl shadow-[0_2px_10px_-3px_rgba(6,81,237,0.1)] border border-slate-100">
        <div>
            <div class="mx-auto w-12 h-12 bg-slate-900 text-white rounded-xl flex items-center justify-center font-bold text-xl tracking-tighter shadow-sm">
                SS
            </div>
            <h2 class="mt-6 text-center text-2xl font-semibold tracking-tight text-slate-900">
                SkillSync Recruiter Console
            </h2>
            <p class="mt-2 text-center text-sm text-slate-500">
                Launch job posts and assessment payloads from one workspace.
            </p>
        </div>

        {% if error %}
        <div class="rounded-lg bg-red-50 p-4 border border-red-100 mt-6">
            <div class="flex">
                <div class="ml-3">
                    <h3 class="text-sm font-medium text-red-800">{{ error }}</h3>
                </div>
            </div>
        </div>
        {% endif %}

        <form class="mt-8 space-y-6" action="/auth/login" method="post">
            <div class="space-y-4">
                <div>
                    <label for="username" class="block text-sm font-medium text-slate-700">Username</label>
                    <div class="mt-1">
                        <input id="username" name="username" type="text" value="{{ default_username }}" required class="appearance-none block w-full px-3 py-2 border border-slate-300 rounded-lg shadow-sm placeholder-slate-400 focus:outline-none focus:ring-slate-500 focus:border-slate-500 sm:text-sm transition-colors">
                    </div>
                </div>

                <div>
                    <label for="password" class="block text-sm font-medium text-slate-700">Password</label>
                    <div class="mt-1">
                        <input id="password" name="password" type="password" value="{{ default_password }}" required class="appearance-none block w-full px-3 py-2 border border-slate-300 rounded-lg shadow-sm placeholder-slate-400 focus:outline-none focus:ring-slate-500 focus:border-slate-500 sm:text-sm transition-colors">
                    </div>
                </div>
            </div>

            <div>
                <button type="submit" class="w-full flex justify-center py-2.5 px-4 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-slate-900 hover:bg-slate-800 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-slate-900 transition-colors">
                    Sign In
                </button>
            </div>
        </form>

        <div class="mt-6 border-t border-slate-100 pt-6">
            <p class="text-xs text-center text-slate-500">
                Default credentials: <code class="bg-slate-100 px-1.5 py-0.5 rounded text-slate-700 font-mono">{{ default_username }}</code> / <code class="bg-slate-100 px-1.5 py-0.5 rounded text-slate-700 font-mono">{{ default_password }}</code>
            </p>
        </div>
    </div>
</div>
{% endblock %}
